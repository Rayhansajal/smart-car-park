server.port=8080
spring.application.name=parking-management

spring.datasource.url=jdbc:mysql://localhost:3306/car_parking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
